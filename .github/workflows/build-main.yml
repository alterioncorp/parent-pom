name: Build and Publish

on:
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: alterioncorp/.github/.github/actions/import-gpg-key@main
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - uses: alterioncorp/.github/.github/actions/maven-settings@main

      - name: Build and Publish
        run: mvn clean deploy -U -Ppublish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
